name: build-push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NAME: application
  IMAGE: application
  NAMESPACE: default

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: "update-image : checkout"
        uses: actions/checkout@v4

      - name: "update-image : setup buildx"
        uses: docker/setup-buildx-action@v3

      - name: "update-image : login"
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.SA_KEY }}

      - name: "update-image : build and push"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cr.yandex/${{ secrets.REG_ID }}/${{ env.IMAGE }}:latest
            cr.yandex/${{ secrets.REG_ID }}/${{ env.IMAGE }}:${{ github.sha }}
