name: update-image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NAME: application
  IMAGE: application
  NAMESPACE: application

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
      - name: "update-image : checkout"
        uses: actions/checkout@v4

      - name: "update-image : setup buildx"
        uses: docker/setup-buildx-action@v3

      - name: "update-image : login"
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: json_key
          password: ${{ secrets.SA_KEY }}

      - name: "update-image : build and push"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cr.yandex/${{ secrets.REG_ID }}/${{ env.IMAGE }}:latest
            cr.yandex/${{ secrets.REG_ID }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: "update-image : setup kubectl"
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: "update-image : setup kubeconfig"
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: "update-image : check deployment"
        run: |
          if kubectl get deployment/${{ env.NAME }} -n ${{ env.NAMESPACE }} &>/dev/null; then
            echo "DEPLOYMENT_EXISTS=true" >> $GITHUB_ENV
          else
            echo "DEPLOYMENT_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: "update-image : update image"
        if: env.DEPLOYMENT_EXISTS == 'true'
        run: |
          kubectl set image deployment/${{ env.NAME }} \
            ${{ env.NAME }}=cr.yandex/${{ secrets.REG_ID }}/${{ env.IMAGE }}:${{ github.sha }} \
            -n ${{ env.NAMESPACE }} --record

          kubectl rollout status deployment/${{ env.NAME }} \
            -n ${{ env.NAMESPACE }}

      - name: "update-image : create deployment if missing"
        if: env.DEPLOYMENT_EXISTS == 'false'
        run: |
          echo "Deployment does not exist. Please apply manifests first."
          exit 1
